<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future of AI in Healthcare</title>
    <style>
        /* Reset and Base Settings */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f0f0f0; /* Neutral background for viewing context */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Calibri', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Slide Container - Fixed Dimensions */
        .slide {
            width: 1280px;
            height: 720px;
            background-color: #FFFFFF;
            position: relative;
            overflow: hidden;
            padding: 70px;
            display: grid;
            grid-template-columns: 450px 1fr; /* Image Left, Content Right */
            gap: 60px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1); /* Subtle shadow for presentation feel */
        }

        /* Color Palette & Variables */
        :root {
            --corporate-blue: #003366;
            --accent-blue: #0056b3;
            --light-blue: #E6F0FA;
            --text-dark: #333333;
            --white: #FFFFFF;
        }

        /* Left Column: Image */
        .image-container {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 51, 102, 0.15);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Right Column: Content */
        .content-container {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: 100%;
        }

        /* Typography */
        h1 {
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 42px;
            color: var(--corporate-blue);
            margin-bottom: 50px;
            line-height: 1.2;
            letter-spacing: -0.5px;
            border-bottom: 4px solid var(--accent-blue);
            padding-bottom: 20px;
            display: inline-block;
            width: 100%;
        }

        /* Timeline / Process List */
        .timeline {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            position: relative;
            padding-left: 20px; /* Space for the line */
        }

        /* Vertical Line */
        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15px;
            bottom: 15px;
            width: 2px;
            background: linear-gradient(to bottom, var(--corporate-blue), rgba(0, 51, 102, 0.1));
        }

        .timeline-item {
            position: relative;
            padding-left: 40px;
            display: flex;
            align-items: center;
            margin-bottom: 25px; /* Fallback spacing */
            flex: 1;
        }

        /* Timeline Node */
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -9px; /* Center on the 2px line */
            width: 20px;
            height: 20px;
            background-color: var(--white);
            border: 4px solid var(--corporate-blue);
            border-radius: 50%;
            z-index: 2;
        }

        /* Active/Highlight styling for visual interest */
        .timeline-item:first-child::before {
            background-color: var(--corporate-blue);
            border-color: var(--accent-blue);
        }

        .item-content {
            font-size: 24px; /* Scaled slightly up from body for hierarchy */
            color: var(--text-dark);
            font-weight: bold;
            background: var(--light-blue);
            padding: 15px 25px;
            border-radius: 0 12px 12px 0;
            border-left: 4px solid var(--corporate-blue);
            width: 100%;
            transition: transform 0.2s ease;
        }

        .item-number {
            font-family: 'Arial', sans-serif;
            font-size: 20px; /* Body size parameter */
            color: var(--accent-blue);
            margin-right: 15px;
            opacity: 0.7;
        }

        /* Cognitive Principle: Serial Position Effect 
           Subtle emphasis on first and last items via opacity/weight adjustments handled visually
        */

    </style>
</head>
<body>

    <div class="slide">
        <!-- Left: Visual Anchor -->
        <div class="image-container">
            <!-- Image representing AI/Medical Technology -->
            <img src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?q=80&w=1280&auto=format&fit=crop" alt="Doctor analyzing digital medical data interface">
        </div>

        <!-- Right: Process Content -->
        <div class="content-container">
            <h1>Future of AI in Healthcare</h1>

            <div class="timeline">
                <div class="timeline-item">
                    <div class="item-content">
                        <span class="item-number">01</span>
                        AI-powered diagnostics
                    </div>
                </div>

                <div class="timeline-item">
                    <div class="item-content">
                        <span class="item-number">02</span>
                        Predictive patient risk models
                    </div>
                </div>

                <div class="timeline-item">
                    <div class="item-content">
                        <span class="item-number">03</span>
                        Personalized medicine
                    </div>
                </div>

                <div class="timeline-item">
                    <div class="item-content">
                        <span class="item-number">04</span>
                        Hospital workflow automation
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
