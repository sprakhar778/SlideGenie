<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sustainable Energy Transition</title>
    <style>
        /* MANDATORY BODY STYLE */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* UNIVERSAL BOX-SIZING */
        * {
            box-sizing: border-box;
        }

        /* FIXED SLIDE CONTAINER */
        .slide {
            width: 1380px;
            height: 700px;
            padding: 50px;
            padding-bottom: 40px;
            background-color: #ffffff;
            overflow: hidden;
            position: relative;
            display: grid;
            grid-template-rows: auto 1fr auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            border-left: 12px solid #00b09b; /* Green accent */
        }

        /* HEADER SECTION */
        header {
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 48px; /* Scaled for 1380px width based on H1:42px input + hierarchy */
            line-height: 1.2;
            margin: 0;
            color: #1a2b3c;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 20px;
            color: #00b09b;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        /* MAIN CONTENT GRID */
        .content {
            display: grid;
            grid-template-columns: 1fr 550px;
            gap: 60px;
            align-items: center;
        }

        /* TEXT CONTENT */
        .text-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            font-size: 24px; /* Body: 20px scaled up for presentation visibility */
            line-height: 1.5;
            color: #444;
            margin-bottom: 24px;
            padding-left: 40px;
            position: relative;
        }

        /* Custom Gradient Bullets */
        li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00b09b, #96c93d);
        }

        li strong {
            color: #005f6b;
            font-weight: 600;
        }

        /* REQUIRED IMAGE WRAPPER (Dimensions adjusted for layout balance) */
        .image-wrapper {
            width: 550px;
            height: 400px;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            position: relative;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* DECORATIVE OVERLAY ON IMAGE */
        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
            z-index: 1;
        }

        /* FOOTER */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 16px;
            color: #888;
            padding-top: 20px;
        }

        .footer-accent {
            height: 4px;
            width: 100px;
            background: linear-gradient(90deg, #00b09b, #96c93d);
            border-radius: 2px;
        }

        /* BACKGROUND DECORATION */
        .bg-blob {
            position: absolute;
            top: -100px;
            right: -50px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(150, 201, 61, 0.05) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="slide">
        <!-- Decorative Background -->
        <div class="bg-blob"></div>

        <!-- Header -->
        <header>
            <span class="subtitle">Strategic Overview</span>
            <h1>Sustainable Energy Transition</h1>
        </header>

        <!-- Main Content -->
        <div class="content">
            <div class="text-section">
                <ul>
                    <li><strong>Shift from fossil fuels</strong> to renewable sources</li>
                    <li>Accelerated <strong>solar and wind power</strong> growth</li>
                    <li>Comprehensive <strong>grid modernization</strong></li>
                    <li>Advanced <strong>energy storage</strong> technologies</li>
                    <li>Alignment with <strong>policy and climate goals</strong></li>
                </ul>
            </div>

            <div class="image-wrapper">
                <div class="image-overlay"></div>
                <!-- Unsplash Source: Solar Panels / Clean Energy -->
                <img src="https://images.unsplash.com/photo-1509391366360-2e959784a276?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Solar panels and wind turbines landscape">
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <div>Clean Energy Initiative 2024</div>
            <div class="footer-accent"></div>
        </footer>
    </div>

</body>
</html>
