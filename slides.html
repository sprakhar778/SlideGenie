<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Future of AI in Healthcare</title>
    <style>
        /* MANDATORY RESET & BASE STYLES */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1F2933; /* Dark background for presentation mode context */
            font-family: 'Calibri', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* SLIDE CONTAINER - FIXED DIMENSIONS */
        .slide {
            width: 1280px;
            height: 720px;
            padding: 70px;
            background-color: #F5F7FA;
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: 540px 1fr; /* Specific column widths for control */
            gap: 60px;
            break-inside: avoid;
            page-break-inside: avoid;
            color: #1F2933;
        }

        /* TYPOGRAPHY */
        h1 {
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 42px;
            color: #1F2933;
            line-height: 1.2;
            margin-bottom: 56px;
            letter-spacing: -0.5px;
        }

        /* LEFT COLUMN: CONTENT & TIMELINE */
        .content-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            position: relative;
        }

        /* Decorative Accent Line on Left Edge */
        .accent-strip {
            position: absolute;
            left: -70px;
            top: 70px;
            bottom: 70px;
            width: 8px;
            background-color: #2563EB;
        }

        .timeline-container {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Continuous Vertical Line */
        .timeline-line {
            position: absolute;
            left: 28px; /* Center of 56px icon */
            top: 28px;
            bottom: 28px;
            width: 2px;
            background-color: #CBD2D9;
            z-index: 0;
        }

        .timeline-item {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .timeline-item:last-child {
            margin-bottom: 0;
        }

        /* ICON STYLING */
        .icon-box {
            width: 56px;
            height: 56px;
            background-color: #FFFFFF;
            border: 2px solid #2563EB;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 24px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .icon-box svg {
            width: 24px;
            height: 24px;
            fill: #2563EB;
        }

        /* TEXT STYLING */
        .text-content {
            font-size: 26px; /* Scaled for hierarchy (Body 20px * 1.3) */
            font-weight: 600;
            color: #1F2933;
            line-height: 1.3;
        }

        /* RIGHT COLUMN: VISUAL */
        .visual-right {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        /* IMAGE WRAPPER (REQUIRED) */
        .image-wrapper {
            width: 540px;
            height: 580px;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 24px 48px rgba(31, 41, 51, 0.12);
            position: relative;
            background-color: #E4E7EB;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Gradient Overlay for Text Contrast/Style */
        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(to top, rgba(31, 41, 51, 0.6), transparent);
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="slide">
        <!-- Left Column -->
        <div class="content-left">
            <div class="accent-strip"></div>
            
            <h1>Future of AI in Healthcare</h1>

            <div class="timeline-container">
                <div class="timeline-line"></div>

                <!-- Item 1 -->
                <div class="timeline-item">
                    <div class="icon-box">
                        <!-- Diagnostics Icon -->
                        <svg viewBox="0 0 24 24"><path d="M9.17 16.83c1.56 1.56 4.1 1.56 5.66 0 1.56-1.56 1.56-4.1 0-5.66l-5.66 5.66zM18 2.01L6 2c-1.1 0-2 .89-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.11-.9-1.99-2-1.99zM10 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM7 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm5 16c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>
                    </div>
                    <div class="text-content">AI-powered diagnostics</div>
                </div>

                <!-- Item 2 -->
                <div class="timeline-item">
                    <div class="icon-box">
                        <!-- Predictive/Chart Icon -->
                        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
                    </div>
                    <div class="text-content">Predictive patient risk models</div>
                </div>

                <!-- Item 3 -->
                <div class="timeline-item">
                    <div class="icon-box">
                        <!-- Personalized/DNA Icon -->
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                    </div>
                    <div class="text-content">Personalized medicine</div>
                </div>

                <!-- Item 4 -->
                <div class="timeline-item">
                    <div class="icon-box">
                        <!-- Workflow/Settings Icon -->
                        <svg viewBox="0 0 24 24"><path d="M2 17h2v.5H3v1h1v.5H2v1h3v-4H2v1zm1-9h1V4H2v1h1v3zm-1 3h1.8L2 13.1v.9h3v-1H3.2L5 10.9V10H2v1zm5-6v2h14V5H7zm0 14h14v-2H7v2zm0-6h14v-2H7v2z"/></svg>
                    </div>
                    <div class="text-content">Hospital workflow automation</div>
                </div>
            </div>
        </div>

        <!-- Right Column -->
        <div class="visual-right">
            <div class="image-wrapper">
                <img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=1000&auto=format&fit=crop" alt="Doctor analyzing medical data on tablet">
                <div class="image-overlay"></div>
            </div>
        </div>
    </div>

</body>
</html>
