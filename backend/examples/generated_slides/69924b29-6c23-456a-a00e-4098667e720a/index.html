<!DOCTYPE html>
<html>
<head>
    <title>Slides - Artificial Intelligence</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
        }

        .slide iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .active {
            display: block;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 15px 20px;
            cursor: pointer;
            font-size: 18px;
            border-radius: 50%;
        }

        .prev { left: 20px; }
        .next { right: 20px; }

        .indicator {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>

<body>

<div class="carousel-container">

    <!-- Slides -->
    <div class="slide active">
        <iframe src="04_Process.html"></iframe>
    </div>

    <div class="slide">
        <iframe src="07_Summary.html"></iframe>
    </div>

    <div class="slide">
        <iframe src="05_Visual Emphasis.html"></iframe>
    </div>

    <div class="slide">
        <iframe src="01_Hero.html"></iframe>
    </div>

    <div class="slide">
        <iframe src="08_Thank You.html"></iframe>
    </div>

    <div class="slide">
        <iframe src="02_Agenda.html"></iframe>
    </div>

    <div class="slide">
        <iframe src="06_Key Points.html"></iframe>
    </div>

    <div class="slide">
        <iframe src="03_Concept Explanation.html"></iframe>
    </div>

    <!-- Navigation Buttons -->
    <button class="nav-btn prev" onclick="changeSlide(-1)">❮</button>
    <button class="nav-btn next" onclick="changeSlide(1)">❯</button>

    <!-- Indicator -->
    <div class="indicator" id="indicator"></div>

</div>

<script>
    let currentSlide = 0;
    const slides = document.querySelectorAll(".slide");
    const indicator = document.getElementById("indicator");

    function showSlide(index) {
        slides.forEach(slide => slide.classList.remove("active"));

        if (index >= slides.length) currentSlide = 0;
        else if (index < 0) currentSlide = slides.length - 1;
        else currentSlide = index;

        slides[currentSlide].classList.add("active");
        indicator.innerText = `Slide ${currentSlide + 1} of ${slides.length}`;
    }

    function changeSlide(direction) {
        showSlide(currentSlide + direction);
    }

    // Keyboard Support
    document.addEventListener("keydown", function(e) {
        if (e.key === "ArrowRight") changeSlide(1);
        if (e.key === "ArrowLeft") changeSlide(-1);
    });

    showSlide(0);
</script>

</body>
</html>
