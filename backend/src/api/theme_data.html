<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Themes</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#111116;
padding:2rem;
font-family:system-ui,-apple-system,sans-serif;
}

.gallery{
max-width:1400px;
margin:0 auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(380px,1fr));
gap:2rem;
}

.theme-card{
border-radius:1.5rem;
overflow:hidden;
box-shadow:0 25px 50px -12px rgba(0,0,0,.5);
transition:transform .2s ease, box-shadow .2s ease;
height:480px;
display:flex;
flex-direction:column;
}

.theme-card:hover{
transform:translateY(-4px);
box-shadow:0 30px 60px -10px rgba(0,0,0,.6);
}

.slide-preview{
flex:1;
padding:1.75rem;
display:flex;
flex-direction:column;
}

.slide-header{
display:flex;
justify-content:space-between;
margin-bottom:1.5rem;
}

.theme-name{
font-size:1.25rem;
font-weight:700;
}

.badge{
font-size:.7rem;
font-weight:600;
padding:.2rem .6rem;
border-radius:2rem;
background:rgba(255,255,255,.15);
text-transform:uppercase;
}

.slide-content{
flex:1;
display:flex;
flex-direction:column;
}

.title-line{
height:1.75rem;
width:80%;
margin-bottom:.5rem;
border-radius:.25rem;
}

.title-line.short{
width:45%;
}

.body-line{
height:.75rem;
width:100%;
margin-bottom:.4rem;
border-radius:.125rem;
}

.body-line.medium{
width:75%;
}

.body-line.short{
width:55%;
}

.eyebrow-demo{
margin-top:1.25rem;
font-size:.75rem;
text-transform:uppercase;
letter-spacing:3px;
}

.color-swatches{
display:flex;
gap:.5rem;
margin:1.25rem 0 .75rem;
}

.swatch{
width:2rem;
height:2rem;
border-radius:.5rem;
}

.card-ui{
margin-top:.75rem;
padding:.75rem;
border-radius:.75rem;
display:flex;
align-items:center;
gap:.75rem;
}

.card-avatar{
width:2rem;
height:2rem;
border-radius:.5rem;
}

.card-line{
height:.5rem;
width:60%;
border-radius:.125rem;
}
</style>
</head>

<body>

<div class="gallery" id="gallery">


</div>

</body>
</html>
