<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide Stream Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7fff8c;
    --accent2: #5b9aff;
    --text: #e8e8f0;
    --muted: #4a4a6a;
    --danger: #ff5b6e;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; }
  .logo span { color: var(--accent); }

  .controls {
    display: flex; gap: 12px; align-items: center;
  }
  .input-row {
    display: flex; gap: 8px; align-items: center;
  }
  input[type="text"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 8px 14px;
    border-radius: 8px;
    outline: none;
    width: 260px;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent2); }

  button {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #0a0a0f;
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

  /* ── Status bar ── */
  #status-bar {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 6px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }
  .status-dot.streaming { background: var(--accent); animation: pulse 1s infinite; }
  .status-dot.done { background: var(--accent2); }
  .status-dot.error { background: var(--danger); }

  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
  }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 100px);
  }

  /* ── Slide list sidebar ── */
  #slide-list {
    width: 200px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--surface);
  }
  .slide-list-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 4px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .slide-thumb {
    cursor: pointer;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg);
    transition: all 0.15s;
    position: relative;
  }
  .slide-thumb:hover { border-color: var(--muted); }
  .slide-thumb.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .slide-thumb-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    padding: 4px 8px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .slide-thumb.active .slide-thumb-label { color: var(--accent); }
  .slide-thumb-preview {
    width: 100%;
    height: 90px;
    overflow: hidden;
    position: relative;
  }
  .slide-thumb-preview iframe {
    width: 600%;
    height: 600%;
    transform: scale(0.1666);
    transform-origin: top left;
    border: none;
    pointer-events: none;
  }
  .streaming-badge {
    position: absolute; top: 4px; right: 4px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 0.8s infinite;
    display: none;
  }
  .slide-thumb.loading .streaming-badge { display: block; }

  /* ── Viewer ── */
  #viewer {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .viewer-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .viewer-toolbar .slide-id {
    color: var(--accent);
    font-weight: 400;
  }
  .view-tabs {
    display: flex; gap: 4px;
  }
  .view-tab {
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.72rem;
    border: 1px solid transparent;
    color: var(--muted);
    transition: all 0.15s;
  }
  .view-tab.active { border-color: var(--border); color: var(--text); background: var(--surface); }

  .iframe-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #fff;
  }
  .iframe-wrap iframe {
    width: 100%; height: 100%;
    border: none;
    transition: opacity 0.3s;
  }

  /* Code view */
  #code-view {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: none;
    background: var(--bg);
  }
  #code-view.visible { display: block; }
  #code-view pre {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: #a8b0d4;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* ── Empty / placeholder ── */
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
  }
  .placeholder svg { opacity: 0.3; }
  .placeholder p { font-size: 0.85rem; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">Slide<span>Stream</span></div>
  <div class="controls">
    <div class="input-row">
      <input type="text" id="presentation-id" placeholder="Enter presentation_id..." />
      <button class="btn-primary" id="load-btn" onclick="startStream()">▶ Load</button>
      <button class="btn-ghost" id="stop-btn" onclick="stopStream()" disabled>■ Stop</button>
    </div>
  </div>
</header>

<div id="status-bar">
  <div><span class="status-dot" id="dot"></span><span id="status-text">Idle</span></div>
  <div id="slide-count">0 slides</div>
  <div id="token-count">0 tokens</div>
</div>

<div class="main">
  <div id="slide-list">
    <div class="slide-list-label">Slides</div>
    <div id="thumb-container"></div>
  </div>

  <div id="viewer">
    <div class="viewer-toolbar">
      <span>Viewing: <span class="slide-id" id="active-slide-label">—</span></span>
      <div class="view-tabs">
        <div class="view-tab active" onclick="setViewMode('preview', this)">Preview</div>
        <div class="view-tab" onclick="setViewMode('code', this)">HTML</div>
      </div>
    </div>

    <div class="iframe-wrap" id="preview-wrap">
      <div class="placeholder" id="placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
        </svg>
        <p>Enter a presentation ID and click Load</p>
      </div>
      <iframe id="slide-frame" style="display:none"></iframe>
    </div>

    <div id="code-view"><pre id="code-content"></pre></div>
  </div>
</div>

<script>
  // ── State ──
  const slides = {};       // { index: { html: string, iframe: HTMLIFrameElement | null } }
  let activeSlide = null;
  let controller = null;
  let tokenTotal = 0;
  let viewMode = 'preview';

  // ── DOM refs ──
  const thumbContainer = document.getElementById('thumb-container');
  const slideFrame = document.getElementById('slide-frame');
  const placeholder = document.getElementById('placeholder');
  const codeContent = document.getElementById('code-content');
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('status-text');
  const slideCountEl = document.getElementById('slide-count');
  const tokenCountEl = document.getElementById('token-count');
  const activeLabelEl = document.getElementById('active-slide-label');
  const loadBtn = document.getElementById('load-btn');
  const stopBtn = document.getElementById('stop-btn');

  // ── Start stream ──
  async function startStream() {
    const id = document.getElementById('presentation-id').value.trim();
    if (!id) return;

    // Reset
    Object.keys(slides).forEach(k => delete slides[k]);
    thumbContainer.innerHTML = '';
    tokenTotal = 0;
    activeSlide = null;
    slideFrame.style.display = 'none';
    placeholder.style.display = 'flex';
    updateStatus('streaming', 'Connecting…');
    loadBtn.disabled = true;
    stopBtn.disabled = false;

    controller = new AbortController();

    try {
      const res = await fetch(`http://localhost:8000/presentation-slides/${encodeURIComponent(id)}`, {
        signal: controller.signal
      });

      if (!res.ok) {
        updateStatus('error', `Error ${res.status}`);
        reset(); return;
      }

      updateStatus('streaming', 'Streaming…');
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        // Each line is a JSON object
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete last line

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed) continue;
          try {
            const chunk = JSON.parse(trimmed);
            handleChunk(chunk);
          } catch(e) {
            // not JSON, skip
          }
        }
      }

      // Flush remaining buffer
      if (buffer.trim()) {
        try { handleChunk(JSON.parse(buffer.trim())); } catch(e) {}
      }

      updateStatus('done', `Done — ${Object.keys(slides).length} slides`);
      // Mark all as done
      Object.keys(slides).forEach(idx => {
        const thumb = document.getElementById(`thumb-${idx}`);
        if (thumb) thumb.classList.remove('loading');
      });

    } catch(e) {
      if (e.name === 'AbortError') {
        updateStatus('done', 'Stopped');
      } else {
        updateStatus('error', e.message);
      }
    }
    reset();
  }

  function handleChunk(chunk) {
    const { slide_index, token } = chunk;
    if (slide_index === undefined || !token) return;

    tokenTotal++;
    tokenCountEl.textContent = `${tokenTotal} tokens`;

    // Init slide entry
    if (!slides[slide_index]) {
      slides[slide_index] = { html: '' };
      createThumb(slide_index);
      slideCountEl.textContent = `${Object.keys(slides).length} slides`;

      // Auto-select first slide
      if (activeSlide === null) selectSlide(slide_index);
    }

    slides[slide_index].html += token;

    // Mark thumb as loading (streaming)
    const thumb = document.getElementById(`thumb-${slide_index}`);
    if (thumb) thumb.classList.add('loading');

    // Live-update active slide view
    if (activeSlide === slide_index) {
      renderActive();
    }

    // Debounced thumb refresh
    scheduleThumbnailRefresh(slide_index);
  }

  // ── Thumbnail creation ──
  function createThumb(idx) {
    const div = document.createElement('div');
    div.className = 'slide-thumb';
    div.id = `thumb-${idx}`;
    div.onclick = () => selectSlide(idx);
    div.innerHTML = `
      <div class="slide-thumb-preview">
        <iframe id="thumb-iframe-${idx}" sandbox="allow-same-origin allow-scripts"></iframe>
        <div class="streaming-badge"></div>
      </div>
      <div class="slide-thumb-label">
        <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><rect width="8" height="8" rx="1"/></svg>
        Slide ${idx + 1}
      </div>`;
    thumbContainer.appendChild(div);
  }

  const thumbTimers = {};
  function scheduleThumbnailRefresh(idx) {
    clearTimeout(thumbTimers[idx]);
    thumbTimers[idx] = setTimeout(() => refreshThumb(idx), 300);
  }

  function refreshThumb(idx) {
    const iframe = document.getElementById(`thumb-iframe-${idx}`);
    if (!iframe || !slides[idx]) return;
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open(); doc.write(slides[idx].html); doc.close();
  }

  // ── Select slide ──
  function selectSlide(idx) {
    // Deactivate old
    if (activeSlide !== null) {
      const old = document.getElementById(`thumb-${activeSlide}`);
      if (old) old.classList.remove('active');
    }
    activeSlide = idx;
    const thumb = document.getElementById(`thumb-${idx}`);
    if (thumb) thumb.classList.add('active');
    activeLabelEl.textContent = `Slide ${idx + 1}`;
    renderActive();
  }

  function renderActive() {
    if (activeSlide === null || !slides[activeSlide]) return;
    const html = slides[activeSlide].html;

    if (viewMode === 'preview') {
      placeholder.style.display = 'none';
      slideFrame.style.display = 'block';
      const doc = slideFrame.contentDocument || slideFrame.contentWindow.document;
      doc.open(); doc.write(html); doc.close();
    } else {
      codeContent.textContent = html;
    }
  }

  // ── View mode toggle ──
  function setViewMode(mode, el) {
    viewMode = mode;
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');

    const previewWrap = document.getElementById('preview-wrap');
    const codeView = document.getElementById('code-view');

    if (mode === 'preview') {
      previewWrap.style.display = 'flex';
      codeView.classList.remove('visible');
    } else {
      previewWrap.style.display = 'none';
      codeView.classList.add('visible');
    }
    renderActive();
  }

  // ── Stop ──
  function stopStream() {
    if (controller) controller.abort();
  }

  function reset() {
    loadBtn.disabled = false;
    stopBtn.disabled = true;
  }

  // ── Status ──
  function updateStatus(state, msg) {
    dot.className = `status-dot ${state}`;
    statusText.textContent = msg;
  }

  // ── Keyboard nav ──
  document.addEventListener('keydown', e => {
    const keys = Object.keys(slides).map(Number).sort((a,b)=>a-b);
    if (!keys.length || activeSlide === null) return;
    const cur = keys.indexOf(activeSlide);
    if (e.key === 'ArrowRight' && cur < keys.length - 1) selectSlide(keys[cur+1]);
    if (e.key === 'ArrowLeft' && cur > 0) selectSlide(keys[cur-1]);
  });

  // Enter to load
  document.getElementById('presentation-id').addEventListener('keydown', e => {
    if (e.key === 'Enter') startStream();
  });
</script>
</body>
</html>
